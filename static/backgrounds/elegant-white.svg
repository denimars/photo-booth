<svg width="400" height="1200" viewBox="0 0 400 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#FAFAF8"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#EBEBEB"/>
    </pattern>
  </defs>

  <!-- Main background -->
  <rect width="400" height="1200" fill="url(#whiteGrad)"/>
  <rect width="400" height="1200" fill="url(#dots)"/>

  <!-- Decorative border -->
  <rect x="15" y="15" width="370" height="1170" fill="none" stroke="#D4A59A" stroke-width="2" rx="10"/>
  <rect x="25" y="25" width="350" height="1150" fill="none" stroke="#88AEA4" stroke-width="1" rx="8"/>

  <!-- Corner decorations -->
  <g fill="#D4A59A">
    <!-- Top left -->
    <circle cx="35" cy="35" r="6"/>
    <circle cx="35" cy="52" r="2.5" fill="#88AEA4"/>
    <circle cx="52" cy="35" r="2.5" fill="#88AEA4"/>

    <!-- Top right -->
    <circle cx="365" cy="35" r="6"/>
    <circle cx="365" cy="52" r="2.5" fill="#88AEA4"/>
    <circle cx="348" cy="35" r="2.5" fill="#88AEA4"/>

    <!-- Bottom left -->
    <circle cx="35" cy="1165" r="6"/>
    <circle cx="35" cy="1148" r="2.5" fill="#88AEA4"/>
    <circle cx="52" cy="1165" r="2.5" fill="#88AEA4"/>

    <!-- Bottom right -->
    <circle cx="365" cy="1165" r="6"/>
    <circle cx="365" cy="1148" r="2.5" fill="#88AEA4"/>
    <circle cx="348" cy="1165" r="2.5" fill="#88AEA4"/>
  </g>

  <!-- Photo frame areas -->
  <g fill="#fff" stroke="#EBEBEB" stroke-width="1">
    <rect x="45" y="50" width="310" height="232" rx="4"/>
    <rect x="45" y="307" width="310" height="232" rx="4"/>
    <rect x="45" y="564" width="310" height="232" rx="4"/>
    <rect x="45" y="821" width="310" height="232" rx="4"/>
  </g>

  <!-- Bottom branding -->
  <text x="200" y="1100" font-family="Georgia, serif" font-size="20" fill="#D4A59A" text-anchor="middle" font-style="italic">Photo Booth</text>
  <line x1="120" y1="1115" x2="280" y2="1115" stroke="#88AEA4" stroke-width="1"/>
  <text x="200" y="1138" font-family="Arial, sans-serif" font-size="9" fill="#9E9E9E" text-anchor="middle" letter-spacing="2">CAPTURE THE MOMENT</text>
</svg>