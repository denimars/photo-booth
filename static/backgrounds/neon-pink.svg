<svg width="400" height="1200" viewBox="0 0 400 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="softGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5D0"/>
      <stop offset="50%" style="stop-color:#F0E2DD"/>
      <stop offset="100%" style="stop-color:#E8D5D0"/>
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="400" height="1200" fill="url(#softGrad)"/>

  <!-- Decorative pattern -->
  <g fill="#fff" opacity="0.4">
    <circle cx="50" cy="100" r="20"/>
    <circle cx="350" cy="200" r="15"/>
    <circle cx="80" cy="400" r="10"/>
    <circle cx="320" cy="600" r="18"/>
    <circle cx="60" cy="800" r="12"/>
    <circle cx="340" cy="1000" r="10"/>
  </g>

  <!-- Border -->
  <rect x="15" y="15" width="370" height="1170" fill="none" stroke="#fff" stroke-width="2" rx="15"/>
  <rect x="25" y="25" width="350" height="1150" fill="none" stroke="#88AEA4" stroke-width="1" rx="12"/>

  <!-- Photo frames with white background -->
  <g fill="#fff" stroke="#D4A59A" stroke-width="1">
    <rect x="40" y="50" width="320" height="240" rx="8"/>
    <rect x="40" y="315" width="320" height="240" rx="8"/>
    <rect x="40" y="580" width="320" height="240" rx="8"/>
    <rect x="40" y="845" width="320" height="240" rx="8"/>
  </g>

  <!-- Bottom text -->
  <text x="200" y="1120" font-family="Georgia, serif" font-size="24" fill="#3D3D3D" text-anchor="middle" font-style="italic">Photo Booth</text>
  <text x="200" y="1150" font-family="Arial, sans-serif" font-size="11" fill="#88AEA4" text-anchor="middle" letter-spacing="3">PARTY TIME</text>
</svg>